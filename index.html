<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>main</title>
    <link rel="stylesheet" href="./styles/style.css">
  </head>
  <body class="bg-neutral-900 text-neutral-0 font-Dmsans-variable">

    <header class="max-w-[1400px] mx-auto font-medium">
      <nav class="py-6 px-4 flex justify-between max-[330px]:flex-col relative">
        <a href="index.html">
        <img class="" src="./assets/images/logo.svg" alt="Weather Now Home" width="180" height="50">
        </a>
        <button id="unitsBtn" class="bg-neutral-800 px-5 py-2 flex gap-1 items-center rounded-lg
         hover:bg-neutral-700 cursor-pointer self-end
        after:inline-block after:h-6 after:content-[url('/assets/images/icon-dropdown.svg')]
        before:inline-block before:h-5 before:content-[url('/assets/images/icon-units.svg')]">Units</button>
        <div class="absolute right-4 mt-13 max-[330px]:mt-22 select-none z-0">
          <div id="menu" class="bg-neutral-800 opacity-0 invisible pointer-events-none
          transition-all duration-250 transform -translate-y-4 ease-out 
           px-2 py-1 rounded-lg border-b-2 border-neutral-700">
            <button class="bg-neutral-800 pr-11 py-2 pl-2 flex gap-1 rounded-lg hover:bg-neutral-700 cursor-pointer">Swtich to Imperial</button>

            <fieldset>
              <legend class="text-neutral-300 pl-1">Temperature</legend>
              <div class="pl-2 flex rounded-lg hover:bg-neutral-700">
                <input class="peer appearance-none" type="radio" name="temp" id="cel" value="celsius" checked>
                <label class="py-2 flex justify-between after:px-2 cursor-pointer
                after:content-[url('/assets/images/icon-checkmark.svg')] w-full after:invisible
                peer-checked:after:visible" for="cel">Celsius (&deg;C)</label>
              </div>
              <div class="pl-2 flex rounded-lg hover:bg-neutral-700">
                <input class="peer appearance-none" type="radio" name="temp" id="feh" value="fehrenheit">
                <label class="py-2 flex justify-between after:px-2 cursor-pointer 
                after:content-[url('/assets/images/icon-checkmark.svg')] w-full after:invisible
                peer-checked:after:visible" for="feh">Fehrenheit (&deg;F)</label>
              </div>
            </fieldset>

            <fieldset>
              <legend class="text-neutral-300 pl-1">Wind Speed</legend>
              <div class="pl-2 flex rounded-lg hover:bg-neutral-700">
                <input class="peer appearance-none" type="radio" name="wind" id="km" value="km/h" checked>
                <label class="py-2 flex justify-between after:px-2 cursor-pointer
                after:content-[url('/assets/images/icon-checkmark.svg')] w-full after:invisible
                peer-checked:after:visible" for="km">km/h</label>
              </div>
              <div class="pl-2 flex rounded-lg hover:bg-neutral-700">
                <input class="peer appearance-none" type="radio" name="wind" id="mph" value="mph">
                <label class="py-2 flex justify-between after:px-2 cursor-pointer 
                after:content-[url('/assets/images/icon-checkmark.svg')] w-full after:invisible
                peer-checked:after:visible" for="mph">Fehrenheit (&deg;F)</label>
              </div>
            </fieldset>

            <fieldset>
              <legend class="text-neutral-300 pl-1">Precipitation</legend>
              <div class="pl-2 flex rounded-lg hover:bg-neutral-700">
                <input class="peer appearance-none" type="radio" name="per" id="mm" value="millimeters" checked>
                <label class="py-2 flex justify-between after:px-2 cursor-pointer
                after:content-[url('/assets/images/icon-checkmark.svg')] w-full after:invisible
                peer-checked:after:visible" for="mm">Millimeters (mm)</label>
              </div>
              <div class="pl-2 flex rounded-lg hover:bg-neutral-700">
                <input class="peer appearance-none" type="radio" name="per" id="in" value="inches">
                <label class="py-2 flex justify-between after:px-2 cursor-pointer 
                after:content-[url('/assets/images/icon-checkmark.svg')] w-full after:invisible
                peer-checked:after:visible" for="in">Inches (in)</label>
              </div>
            </fieldset>
          </div>
        </div>
      </nav>
    </header>

    <main class="max-w-[1400px] mx-auto">
      <div class="px-4 py-6 flex flex-col items-center gap-14">
        <h1 class="font-bricolage-bold text-6xl max-[366px]:text-5xl text-center">How's the sky looking today</h1>
        <div id="searchIn" class="flex flex-col md:flex-row gap-3 w-full z-10 md:max-w-[750px]">
          <div class="bg-neutral-800 flex gap-2 pl-2 rounded-lg flex-1">
            <img src="./assets/images/icon-search.svg" width="24" alt="Search Icon">
            <input type="text" name="" id="" placeholder="Search for a place..."
            class="w-full appearance-none focus:outline-none py-3 text-lg placeholder:text-neutral-100">
          </div>
            <button class="bg-blue-500 py-3 rounded-lg text-lg cursor-pointer md:w-28">Search</button>
        </div>
      </div>

        <div class="px-4 py-8">

          <div class="max-sm:bg-[url('/assets/images/bg-today-small.svg')] 
          sm:bg-[url('/assets/images/bg-today-large.svg')]
          bg-center bg-no-repeat bg-cover rounded-lg w-full flex flex-col 
          md:flex-row md:px-6 px-2 py-5
          justify-center md:justify-between items-center">
            <div>
              <h2 class="text-2xl font-semibold">Berlin, Germany</h2>
              <p class="text-lg text-neutral-200">Tuesday, Aug 5, 2025</p>
            </div>
            <div class="flex justify-center items-center gap-3 flex-wrap">
              <img src="./assets/images/icon-sunny.webp" width="150" height="150" alt="">
              <h3 class="text-7xl font-Dmsans-Italic">20&deg;</h3>
            </div>
          </div>

          <div class="py-4 grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-neutral-800 space-y-2 p-4 rounded-lg border
            border-neutral-700">
              <p class="text-lg text-neutral-200">Feels Like</p>
              <p class="text-3xl">18&deg;</p>
            </div>
            <div class="bg-neutral-800 space-y-2 p-4 rounded-lg border
            border-neutral-700">
              <p class="text-lg text-neutral-200">Humidity</p>
              <p class="text-3xl">46%</p>
            </div>
            <div class="bg-neutral-800 space-y-2 p-4 rounded-lg border
            border-neutral-700">
              <p class="text-lg text-neutral-200">Wind</p>
              <p class="text-3xl">14 km/h</p>
            </div>
            <div class="bg-neutral-800 space-y-2 p-4 rounded-lg border
            border-neutral-700">
              <p class="text-lg text-neutral-200">Precipitation</p>
              <p class="text-3xl">0 mm</p>
            </div>


          </div>

        </div>

      

    </main>



    


    <script type="module" src="./scripts/uiController.js"></script>
  </body>
</html>
